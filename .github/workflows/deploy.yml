name: Build and Deploy to EKS

on:
  push:
    branches: [ main ]
    paths-ignore:
      - 'README.md'
      - 'CHECKLIST.md'
      - '디버깅3단계'
      - '진행상황'
      - 'plan'
      - 'apply*'
      - 'destroy*'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    # 1. AWS 자격 증명 설정
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v1
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ap-northeast-2

    # 2. Amazon ECR 로그인
    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v1

    # 3. Docker 이미지 빌드 및 ECR 푸시
    - name: Build, tag, and push image to Amazon ECR
      env:
        # 이 부분이 핵심입니다. 12자리 계정ID를 직접 쓰거나 아래처럼 outputs를 정확히 참조해야 합니다.
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        ECR_REPOSITORY: my-k8s-api
        IMAGE_TAG: latest
      run: |
        # 만약 위 변수가 계속 비어있다면, 아래 줄에 echo를 넣어 확인해볼 수 있습니다.
        echo "Registry is $ECR_REGISTRY"
        docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

    # 4. EKS 접속 설정 (kubectl 명령 사용 가능하게 함)
    - name: Update kubeconfig
      run: aws eks update-kubeconfig --region ap-northeast-2 --name portfolio-cluster

    # 5. Helm을 이용한 배포
    - name: Deploy with Helm
      run: |
        helm upgrade --install my-api ./my-api-chart \
          --set image.repository=${{ steps.login-ecr.outputs.registry }}/my-k8s-api \
          --set image.tag=latest
