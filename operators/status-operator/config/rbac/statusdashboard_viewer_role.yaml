# permissions for end users to view statusdashboards.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: status-operator
    app.kubernetes.io/managed-by: kustomize
  name: statusdashboard-viewer-role
rules:
- apiGroups:
  - infra.infra.local
  resources:
  - statusdashboards
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - infra.infra.local
  resources:
  - statusdashboards/status
  verbs:
  - get
